services:
  - type: web
    name: negotiator-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/NotTahaAli/PropertyRentalNegotiator
    rootDir: backend
    buildCommand: pip install uv && uv sync --locked
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: TOOLS_WEBHOOK_SECRET
        sync: false
      # Previously absent from this file, so every one of these had to be
      # remembered by hand in the Render dashboard — which is why OPENAI (K6),
      # TAVILY (K7) and CORS (real-mode frontend) were all silently unset.
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ELEVENLABS_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://negotiator-frontend-iota.vercel.app
